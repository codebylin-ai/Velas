<body>
    <header class="encabezado">
    <a class="logo" href="../index.html">
        <img src="../Imagenes/logo.jpeg" alt="Logo de Aroma en Casa">
    </a>

    <h1 class="visualmente-oculto">Aroma en Casa</h1>

    <nav aria-label="Navegación principal">
        <ul>
            <li><a href="../index.html">Inicio</a></li>

</header>

    <main>
        <section aria-labelledby="titulo-contacto">
            <h2 id="titulo-contacto">Contacto</h2>
            <p>Escribinos para hacer una consulta o conocer más sobre nuestras velas artesanales.</p>

            <form action="#" method="post">
                <div>
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div>
                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" name="correo" required>
                </div>

                <div>
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" rows="5" required></textarea>
                </div>

                <button type="submit">Enviar consulta</button>
            </form>
        </section>
    </main>

    <footer>
        <p>Nuestras redes: WhatsApp e Instagram.</p>
